name: Build Portable Robotics Workbench

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, for example 1.0.0-rc1"
        required: true
        default: "1.0.0-rc1"

  push:
    tags:
      - "workbench-v*"

permissions:
  contents: write

jobs:
  build-portable-workbench:
    name: Build Windows x64 package
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine package version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }
          else {
            $tag = "${{ github.ref_name }}"

            if (-not $tag.StartsWith("workbench-v")) {
              throw "Unexpected tag format: $tag"
            }

            $version = $tag.Substring("workbench-v".Length)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Package version could not be determined."
          }

          "version=$version" | Out-File `
            -FilePath $env:GITHUB_OUTPUT `
            -Encoding utf8 `
            -Append

          Write-Host "Package version: $version"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            src/Robotics.Workbench/package-lock.json

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Determine source revision
        id: revision
        shell: pwsh
        run: |
          $revision = git rev-parse --short HEAD

          if ([string]::IsNullOrWhiteSpace($revision)) {
            throw "Source revision could not be determined."
          }

          "revision=$revision" | Out-File `
            -FilePath $env:GITHUB_OUTPUT `
            -Encoding utf8 `
            -Append

          Write-Host "Source revision: $revision"

      - name: Build portable package
        shell: pwsh
        run: |
          if (Test-Path ".\artifacts") {
            Remove-Item ".\artifacts" -Recurse -Force
          }

          .\scripts\Publish-PortableWorkbench.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -OutputDirectory ".\artifacts" `
            -SourceRevisionId "${{ steps.revision.outputs.revision }}"

      - name: Validate generated release files
        id: release_files
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $expectedBaseName = "OPC-UA-Robotics-Workbench-$env:VERSION-win-x64"

          $zipPath = "artifacts/$expectedBaseName.zip"

          $checksumCandidates = @(
            "artifacts/$expectedBaseName.sha256",
            "artifacts/$expectedBaseName.zip.sha256"
          )

          $zipFullPath = Join-Path $env:GITHUB_WORKSPACE $zipPath
          if (-not (Test-Path -LiteralPath $zipFullPath -PathType Leaf)) {
            Write-Host "ZIP or checksum files found under artifacts:"
            Get-ChildItem -LiteralPath ".\artifacts" -File -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -like "*.zip" -or $_.Name -like "*.sha256" } |
              ForEach-Object { Write-Host "  $($_.FullName)" }

            throw "Expected package ZIP was not found: $zipPath"
          }

          $checksumPath = $checksumCandidates |
            Where-Object {
              Test-Path -LiteralPath (Join-Path $env:GITHUB_WORKSPACE $_) -PathType Leaf
            } |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($checksumPath)) {
            Write-Host "ZIP or checksum files found under artifacts:"
            Get-ChildItem -LiteralPath ".\artifacts" -File -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -like "*.zip" -or $_.Name -like "*.sha256" } |
              ForEach-Object { Write-Host "  $($_.FullName)" }

            throw "Expected SHA-256 checksum was not found for $expectedBaseName."
          }

          Write-Host "Validated release ZIP:"
          Write-Host "  $zipPath"

          Write-Host "Validated checksum:"
          Write-Host "  $checksumPath"

          [System.IO.File]::AppendAllText(
            $env:GITHUB_OUTPUT,
            "zip_path=$zipPath`nchecksum_path=$checksumPath`nbase_name=$expectedBaseName`n",
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPC-UA-Robotics-Workbench-${{ steps.version.outputs.version }}-win-x64
          path: |
            ${{ steps.release_files.outputs.zip_path }}
            ${{ steps.release_files.outputs.checksum_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub prerelease
        if: startsWith(github.ref, 'refs/tags/workbench-v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          ZIP_PATH: ${{ steps.release_files.outputs.zip_path }}
          CHECKSUM_PATH: ${{ steps.release_files.outputs.checksum_path }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = Join-Path $env:GITHUB_WORKSPACE $env:ZIP_PATH
          $checksum = Join-Path $env:GITHUB_WORKSPACE $env:CHECKSUM_PATH

          if (-not (Test-Path -LiteralPath $zip -PathType Leaf)) {
            throw "Validated release ZIP was not found: $zip"
          }

          if (-not (Test-Path -LiteralPath $checksum -PathType Leaf)) {
            throw "Validated release checksum was not found: $checksum"
          }

          $releaseExists = $false

          & gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
              $releaseExists = $true
          }

          if ($releaseExists) {
              & gh release upload $tag $zip $checksum --clobber
          }
          else {
              $releaseArguments = @(
                  "release",
                  "create",
                  $tag,
                  $zip,
                  $checksum,
                  "--title",
                  "OPC UA Robotics Workbench $env:VERSION",
                  "--generate-notes"
              )

              if ($env:VERSION.Contains("-")) {
                  $releaseArguments += "--prerelease"
              }

              & gh @releaseArguments
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release creation failed with exit code $LASTEXITCODE."
          }
