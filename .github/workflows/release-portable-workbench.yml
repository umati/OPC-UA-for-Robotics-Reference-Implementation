name: Release portable Workbench

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version
        required: true
        type: string
  push:
    tags: ["v*.*.*"]

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: src/Robotics.Workbench/package-lock.json }
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - name: Build, publish, validate, and package clean launcher layout
        shell: pwsh
        run: |
          $version = if ('${{ inputs.version }}') { '${{ inputs.version }}' } else { '${{ github.ref_name }}'.TrimStart('v') }
          # Publish-PortableWorkbench.ps1 owns the package layout validation and checksum.
          .\scripts\Publish-PortableWorkbench.ps1 -Version $version -OutputDirectory .\artifacts -SourceRevisionId '${{ github.sha }}'
      - uses: actions/upload-artifact@v4
        with: { name: portable-workbench, path: artifacts/* }
      - name: Attach release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with: { files: artifacts/* }
